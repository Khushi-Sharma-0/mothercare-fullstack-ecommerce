<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Account | MotherCare</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/mc-shared.css">
</head>
<body class="mc-page">
  <div class="mc-page-content">
    <div class="mc-card mc-auth-form">
      <h1 class="mc-title" style="text-align:center;">Create Your Account 🍼</h1>
      <form id="register-form">
        <label for="name">Full Name</label>
        <input type="text" id="name" required placeholder="Jane Doe" />

        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com" />

        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" placeholder="At least 6 characters" />

        <button type="submit" class="mc-btn">Create Account</button>
        <div class="mc-error" id="error-box"></div>
      </form>
      <p class="mc-link-row">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <script src="assets/js/mc-core.js"></script>
  <script src="assets/js/navbar.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const errorBox = document.getElementById('error-box');
      errorBox.style.display = 'none';
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        await MC.register(name, email, password);
        window.location.href = 'Home_Page_New.html';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
